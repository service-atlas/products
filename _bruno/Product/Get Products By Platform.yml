info:
  name: Get Products By Platform
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/api/platforms/:platform_id/products"
  params:
    - name: platform_id
      value: "1"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/api/platforms/:platform_id/products"
      method: GET
      params:
        - name: platform_id
          value: "1"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "ID": 1,
              "PlatformID": 1,
              "Name": "Product 1",
              "Description": "Description 1",
              "CreatedAt": "2026-05-04T19:17:00Z",
              "UpdatedAt": "2026-05-04T19:17:00Z"
            },
            {
              "ID": 2,
              "PlatformID": 1,
              "Name": "Product 2",
              "Description": "Description 2",
              "CreatedAt": "2026-05-04T19:17:00Z",
              "UpdatedAt": "2026-05-04T19:17:00Z"
            }
          ]

docs: |-
  # Get Products By Platform

  Fetches all products associated with a specific platform ID.

  ## Possible Responses 
  | Status Code | Notes |
  | -- | --|
  | 200 | Successfully fetched (returns array, empty if no products) | 
  | 400 | Invalid platform ID format |
  | 500 | Database error | 
