version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/platform/platforms.sql"
    schema: "schema.sql"
    gen:
      go:
        out: "internal/platform"
        sql_package: "pgx/v5"
        output_models_file_name: "models.gen.go"
        output_db_file_name: "db.gen.go"
        output_files_suffix: ".gen.go"
        output_querier_file_name: "querier.gen.go"
        emit_interface: true

  - engine: "postgresql"
    queries: "internal/product/products.sql"
    schema: "schema.sql"
    gen:
      go:
        out: "internal/product"
        sql_package: "pgx/v5"
        output_models_file_name: "models.gen.go"
        output_db_file_name: "db.gen.go"
        output_files_suffix: ".gen.go"
        output_querier_file_name: "querier.gen.go"
        emit_interface: true
