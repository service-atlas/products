version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/platforms.sql"
    schema: "schema.sql"
    gen:
      go:
        out: "internal/db/platform"
        sql_package: "pgx/v5"
        output_models_file_name: "models.go"
        emit_interface: true

  - engine: "postgresql"
    queries: "queries/products.sql"
    schema: "schema.sql"
    gen:
      go:
        out: "internal/db/product"
        sql_package: "pgx/v5"
        output_models_file_name: "models.go"
        emit_interface: true